name: Update Sant Feliu calendar

on:
  workflow_dispatch:
  schedule:
    - cron: "15 4 * * *"

permissions:
  contents: write

jobs:
  build-calendar:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests
          pip install icalendar

      - name: Generate ICS
        run: python scripts/generate_calendar.py

      - name: Commit ICS if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/santfeliu.ics docs/events.json
          git diff --staged --quiet || git commit -m "Update Sant Feliu calendar"
          git push
